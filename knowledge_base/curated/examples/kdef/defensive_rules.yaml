rules:
  - id: kdef-001
    category: identifier_grounding
    description: Do not invent AADL identifiers.
    pattern: "Every component, port, package, type, and variable name must be grounded or locally declared."
    notes: "If no valid grounding exists, return an unresolved item rather than generating a placeholder."
  - id: kdef-002
    category: full_artifact_output
    description: Repair and fusion agents should return complete AADL artifacts when requested.
    pattern: "Return package ... end package_name;"
    notes: "Partial snippets are difficult to validate and should not replace full-artifact outputs."
  - id: kdef-003
    category: type_consistency
    description: Keep Boolean, integer, and real expressions type-consistent.
    pattern: "Do not assign a Boolean comparison to a numeric variable."
    notes: "Type errors commonly appear after translating natural-language conditions."
  - id: kdef-004
    category: dependency_policy
    description: Do not add unexplained with clauses or dependency packages.
    pattern: "Only use packages present in the source model, public example, or configured local dependency set."
    notes: "Missing package errors should be diagnosed as dependency issues."
