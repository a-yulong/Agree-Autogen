rules:
  - id: ksyn-agree-001
    category: agree_annex_delimiters
    description: AGREE specifications are placed inside an AADL annex block.
    pattern: "annex agree {** ... **};"
    notes: "Preserve both delimiter markers. Do not emit partial annex snippets when a full AADL artifact is requested."
  - id: ksyn-agree-002
    category: labeled_contract_statements
    description: Assumption and guarantee statements should use quoted labels.
    pattern: "guarantee \"label\": expression;"
    notes: "Labels improve diagnostics and make generated contracts traceable to requirements."
  - id: ksyn-agree-003
    category: logical_operators
    description: Use AGREE textual logical operators rather than C-style operators.
    pattern: "a and b; a or b; not(a)"
    notes: "Avoid &&, ||, and ! in generated AGREE clauses."
  - id: ksyn-agree-004
    category: conditional_expression
    description: Use nested if-then-else expressions for explicit selection logic.
    pattern: "if condition then value1 else value2"
    notes: "Do not assume availability of arbitrary math or helper functions."
