rules:
  - id: ksyn-scope-001
    category: component_type_scope
    description: Assumptions, guarantees, and eq declarations are normally placed in component type scopes.
    pattern: "system X ... annex agree {** guarantee \"g\": out_port; **}; end X;"
    notes: "The generator must ground every referenced port in the target component type."
  - id: ksyn-scope-002
    category: implementation_scope
    description: Implementation-level AGREE content is used for assignments or implementation-specific bindings when supported by the model.
    pattern: "system implementation X.impl ... annex agree {** assign out_port = expr; **}; end X.impl;"
    notes: "Assign targets must already exist as output ports or valid AGREE variables."
  - id: ksyn-scope-003
    category: subcomponent_reference
    description: Component type guarantees should not directly reference subcomponent ports.
    pattern: "Avoid subcomponent.port in system type guarantees."
    notes: "Bind subcomponent behavior through valid implementation-level constructs or exposed ports."
  - id: ksyn-scope-004
    category: identifier_grounding
    description: Generated identifiers must come from the AADL model analysis or be declared in a valid AGREE scope.
    pattern: "Use only analyzed component, port, data type, package, and variable names."
    notes: "Unresolved terms should be reported rather than guessed."
