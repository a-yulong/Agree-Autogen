rules:
  - id: ksyn-temporal-001
    category: previous_value
    description: Use pre(expr) to refer to the previous logical step when defining stateful equations.
    pattern: "eq x : int = 0 -> pre(x) + 1;"
    notes: "Always use parentheses with pre."
  - id: ksyn-temporal-002
    category: initialization
    description: Use the arrow operator to provide an initial value for recursive definitions.
    pattern: "initial_value -> next_expression"
    notes: "Do not move initialization into an unrelated assumption."
  - id: ksyn-temporal-003
    category: immediate_implication
    description: Use implication for pointwise safety relationships.
    pattern: "condition => required_output"
    notes: "This sample KB does not include liveness operators or unverified temporal extensions."
