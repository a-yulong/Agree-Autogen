triplet:
  id: kexp-threshold-001
  category: threshold_guard
  requirement_nl: "If measured_value is greater than the high threshold, alarm_out shall be true."
  logic_prop: "measured_value > high_threshold implies alarm_out."
  code_agree: |
    const high_threshold : real = 100.0;
    guarantee "alarm above high threshold": measured_value > high_threshold => alarm_out;
  notes: "Toy pattern for threshold-triggered Boolean output. Port and constant names must be adapted only when grounded in the target model."
