triplet:
  id: kexp-gf-monitor-001
  category: output_activation
  requirement_nl: "When latitude = 10.0 and longitude = 15.0, gfReq shall be activated; when the fence violation condition holds, alarm_out shall be triggered."
  logic_prop: "fence_violation := latitude = 10.0 and longitude = 15.0; fence_violation implies gfReq and alarm_out."
  code_agree: |
    eq fence_violation : bool = (latitude = 10.0) and (longitude = 15.0);
    guarantee "gf request is activated at the fence point": fence_violation => gfReq;
    guarantee "alarm is triggered on fence violation": fence_violation => alarm_out;
  notes: "Project-owned toy example aligned with data/examples/gf_monitor."
