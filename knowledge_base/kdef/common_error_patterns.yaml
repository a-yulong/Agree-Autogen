patterns:
  - id: kdef-error-001
    category: t1_basic_syntax
    description: Missing annex terminator or AADL end statement.
    example: "annex agree {** guarantee \"g\": out;"
    notes: "Check paired annex delimiters and component end statements."
  - id: kdef-error-002
    category: t2_external_reference
    description: Unresolved package, property set, model unit, or with-clause dependency.
    example: "Couldn't resolve reference to ModelUnit 'X'."
    notes: "Do not treat duplicated third-party support files as generated AGREE syntax failures."
  - id: kdef-error-003
    category: t3_scope_position
    description: AGREE content inserted into an invalid AADL scope.
    example: "assign statement placed where a guarantee is expected."
    notes: "Repair by moving the clause to the valid type or implementation scope."
  - id: kdef-error-004
    category: t4_identifier_conflict
    description: Duplicate declaration or illegal redeclaration.
    example: "Identifier is already defined."
    notes: "Prefer reuse of existing declarations over introducing new names."
  - id: kdef-error-005
    category: t5_type_logic
    description: Type mismatch in an AGREE expression.
    example: "left and right sides are of type bool and real."
    notes: "Repair expression structure before changing architecture."
