sources:
  - id: attention_rules
    role: kdef
    source_file: Attention.txt
    repository_path: knowledge_base/raw/kdef/Attention.txt
    processed_outputs:
      - knowledge_base/processed/kdef/attention_zh.md
      - knowledge_base/processed/kdef/defensive_rules.jsonl
    description: Defensive heuristic rules used to reduce AGREE generation failures.

  - id: agree_code_knowledge_dataset
    role: kexp
    source_file: AGREE_code_knowledge_dataset.txt
    repository_path: knowledge_base/raw/kexp/AGREE_code_knowledge_dataset.txt
    processed_outputs:
      - knowledge_base/processed/kexp/agree_code_knowledge_dataset.txt
      - knowledge_base/processed/kexp/agree_examples.jsonl
    description: AGREE code-oriented exemplar dataset used for retrieval-augmented contract synthesis.

  - id: agree_knowledge_dataset_en
    role: ksyn
    source_file: AGREE_knowledge_dataset - en.pdf
    repository_path: knowledge_base/raw/ksyn/AGREE_knowledge_dataset_en.pdf
    processed_outputs:
      - knowledge_base/processed/ksyn/agree_syntax_notes.md
    description: AGREE syntax and semantic knowledge source.

  - id: agree_users_guide
    role: ksyn
    source_file: AGREE_Users_Guide.pdf
    repository_path: knowledge_base/raw/ksyn/AGREE_Users_Guide.pdf
    processed_outputs:
      - knowledge_base/processed/ksyn/agree_syntax_notes.md
    description: AGREE user guide used for syntax, annex, and contract-pattern grounding.

  - id: aadl_as5506c
    role: ksyn
    source_file: AADL-2759780542AS5506C.pdf
    repository_path: null
    local_source_placeholder: "<LOCAL_AADL_STANDARD>/AADL-2759780542AS5506C.pdf"
    public_note_file: knowledge_base/raw/ksyn/AADL_AS5506C.local_source.md
    processed_outputs:
