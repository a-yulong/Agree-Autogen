manifest_id: agree_autogen_public_sources
description: Public source inventory for reconstructing an AGREE-AutoGen RAG corpus.
sources:
  - source_id: agree_documentation_notes
    role: ksyn
    storage: knowledge_base/curated/ksyn/
    runtime_preparation: export selected notes to txt or pdf
  - source_id: aadl_runtime_architecture_analysis
    role: architecture_grounding
    storage: generated during each run
    runtime_preparation: produced by Model Analyst Agent
  - source_id: verified_contract_examples
    role: kexp
    storage: knowledge_base/curated/kexp/
    runtime_preparation: export selected examples to txt or pdf
  - source_id: defensive_generation_rules
    role: kdef
    storage: knowledge_base/curated/kdef/
    runtime_preparation: export selected rules to txt or pdf
