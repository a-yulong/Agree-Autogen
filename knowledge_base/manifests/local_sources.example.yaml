local_rag_corpus:
  docs_directory: knowledge_base/local_rag_docs
  export_format:
    - txt
    - pdf
  vectorstore_dir: vectorstore_cache
  collections:
    generation: agree-unified-generate-v3
    validation: agree-code-v3

source_groups:
  ksyn:
    prepared_dir: knowledge_base/curated/ksyn/
    exported_file: knowledge_base/local_rag_docs/ksyn_notes.txt
  kexp:
    prepared_dir: knowledge_base/curated/kexp/
    exported_file: knowledge_base/local_rag_docs/kexp_examples.txt
  kdef:
    prepared_dir: knowledge_base/curated/kdef/
    exported_file: knowledge_base/local_rag_docs/kdef_rules.txt
