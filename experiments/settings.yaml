settings:
  E1:
    name: Bare Model
    enable_rag: false
    enable_repair: false
    enable_model_analyst: false
    enable_requirement_analyst: false
    enable_fusion: false
    public_runner_status: unsupported_in_public_runner
    required_runtime_support:
      - direct_generation_runner

  E2:
    name: Full Framework
    enable_rag: true
    enable_repair: true
    enable_model_analyst: true
    enable_requirement_analyst: true
    enable_fusion: true
    public_runner_status: executable
    required_runtime_support: []

  E3:
    name: NoRAG
    enable_rag: false
    enable_repair: true
    enable_model_analyst: true
    enable_requirement_analyst: true
    enable_fusion: true
    public_runner_status: executable
    required_runtime_support: []

  E4:
    name: NoRepair
    enable_rag: true
    enable_repair: false
    enable_model_analyst: true
    enable_requirement_analyst: true
    enable_fusion: true
    public_runner_status: unsupported_in_public_runner
    required_runtime_support:
      - repair_loop_switch

  E5:
    name: No Model Analyst
    enable_rag: true
    enable_repair: true
    enable_model_analyst: false
    enable_requirement_analyst: true
    enable_fusion: true
    public_runner_status: unsupported_in_public_runner
    required_runtime_support:
      - model_analyst_switch
      - fallback_architecture_representation

  E6:
    name: No Requirement Analyst
    enable_rag: true
    enable_repair: true
    enable_model_analyst: true
    enable_requirement_analyst: false
    enable_fusion: true
    public_runner_status: unsupported_in_public_runner
    required_runtime_support:
      - requirement_analyst_switch

  E7:
    name: No Dual Analysts
    enable_rag: true
    enable_repair: true
    enable_model_analyst: false
    enable_requirement_analyst: false
    enable_fusion: true
    public_runner_status: unsupported_in_public_runner
    required_runtime_support:
      - model_analyst_switch
      - requirement_analyst_switch
      - fallback_architecture_representation
