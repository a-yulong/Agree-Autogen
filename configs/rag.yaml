embedding_model: BAAI/bge-base-en-v1.5
chunk_size: 512
chunk_overlap: 50
retrieval_setting: balanced_3_3_3
top_k_by_role:
  Ksyn: 3
  Kexp: 3
  Kdef: 3
similarity_threshold: 0.2
knowledge_base_dir: ./knowledge_base
index_dir: ./knowledge_base/index
runtime_docs_dir_env: AGREE_DOCS_DIR
chroma_persist_dir: ./vectorstore_cache
runtime_supported_formats:
  - pdf
  - txt
inspection_supported_formats:
  - txt
  - md
  - csv

